<html>
<head>
    <title>Arcade | Login</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #f8fafc;
        }

        .input-field {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 font-sans text-slate-900">

    <div class="login-card w-full max-w-lg rounded-[2.5rem] p-10 md:p-12 text-center">
        
        <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-50 rounded-xl mb-6">
            <i data-lucide="user" class="w-6 h-6 text-blue-600"></i>
        </div>

        <h1 class="text-3xl font-black tracking-tight mb-2">Player Login</h1>
        <p class="text-slate-500 mb-8 font-medium">Enter your name to start playing</p>

        <form method="POST" action="{% url 'login' %}" class="text-left">
            {% csrf_token %}
            
            <div class="mb-5">
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">First Name</label>
                <input type="text" name="first_name" value="{{ data.first_name }}"
                    class="input-field w-full px-5 py-4 rounded-xl text-lg font-semibold"
                    placeholder="e.g. John">
                {% if errors.first_name %}
                    <p class="text-red-500 text-sm mt-1">{{ errors.first_name }}</p>
                {% endif %}
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Last Name</label>
                <input type="text" name="last_name" value="{{ data.last_name }}"
                    class="input-field w-full px-5 py-4 rounded-xl text-lg font-semibold"
                    placeholder="e.g. Doe">
                {% if errors.last_name %}
                    <p class="text-red-500 text-sm mt-1">{{ errors.last_name }}</p>
                {% endif %}
            </div>

            <button type="submit" 
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg uppercase tracking-wider">
                Join Arcade
            </button>
        </form>

        <div class="mt-8">
            <a href="/" class="text-slate-400 hover:text-slate-600 font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Home
            </a>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
