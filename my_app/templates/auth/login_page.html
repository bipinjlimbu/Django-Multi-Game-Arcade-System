<html>
<head>
    <title>Arcade | Login</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #f8fafc;
        }

        .input-field {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 font-sans text-slate-900">

    <div class="login-card w-full max-w-lg rounded-[2.5rem] p-10 md:p-14 text-center">
        
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-50 rounded-2xl mb-6">
            <i data-lucide="user" class="w-8 h-8 text-blue-600"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-2">Player Login</h1>
        <p class="text-slate-500 mb-8 font-medium">Enter your username to start playing</p>

        <form method="POST" class="text-left">
            {% csrf_token %}
            
            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 uppercase tracking-widest">Username</label>
                <input type="text" name="username" value="{{ data.username }}"
                    class="input-field w-full px-6 py-5 rounded-2xl text-xl font-bold placeholder-slate-300"
                    placeholder="Enter Web Generated Username">
                
                {% if errors.username %}
                    <p class="text-red-500 text-sm mt-2 ml-1 font-semibold">{{ errors.username }}</p>
                {% endif %}
            </div>

            <button type="submit" 
                class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-2xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-2xl uppercase tracking-widest">
                Join Arcade
            </button>
        </form>

        <div class="mt-10 border-t border-slate-100 pt-6">
            <a href="/" class="text-slate-400 hover:text-slate-600 font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Home
            </a>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
