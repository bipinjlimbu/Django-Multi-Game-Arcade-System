<html>
<head>
    <title>Arcade | Register</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: url('{% static "images/Register.avif" %}');
            background-size: cover;
            background-position: center;
            margin: 0;
        }

        .register-card {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #f8fafc;
        }

        .input-field {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 font-sans text-slate-900">

    <div class="register-card w-full max-w-lg rounded-[2.5rem] p-10 md:p-12 text-center">
        
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-50 rounded-2xl mb-6">
            <i data-lucide="user-plus" class="w-8 h-8 text-blue-600"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-2">New Player</h1>
        <p class="text-slate-500 mb-8 font-medium text-lg">Create your profile to save scores</p>

        <form method="POST" action="{% url 'register' %}" class="text-left">
            {% csrf_token %}
            
            <div class="mb-5">
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 uppercase tracking-wider">First Name</label>
                <input type="text" name="first_name" value="{{ data.first_name }}"
                    class="input-field w-full px-6 py-4 rounded-xl text-lg font-semibold placeholder-slate-300"
                    placeholder="Enter your first name">
                {% if errors.first_name %}
                    <p class="text-red-500 text-sm mt-1">{{ errors.first_name }}</p>
                {% endif %}
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 uppercase tracking-wider">Last Name</label>
                <input type="text" name="last_name" value="{{ data.last_name }}"
                    class="input-field w-full px-6 py-4 rounded-xl text-lg font-semibold placeholder-slate-300"
                    placeholder="Enter your last name">
                {% if errors.last_name %}
                    <p class="text-red-500 text-sm mt-1">{{ errors.last_name }}</p>
                {% endif %}
            </div>

            <button type="submit" 
                class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-2xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-2xl uppercase tracking-widest">
                Create Account
            </button>
        </form>

        <div class="mt-10 border-t border-slate-100 pt-6">
            <p class="text-slate-400 font-medium mb-4">Already played before?</p>
            <a href="/login" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-black uppercase tracking-widest text-sm">
                Go to Login
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
