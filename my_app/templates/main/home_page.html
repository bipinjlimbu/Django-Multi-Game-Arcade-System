<html>
<head>
    <title>Arcade System | Home</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: url('{% static "images/home.jpg" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
        }

        .main-card {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #f8fafc;
        }

        .text-gradient {
            background: linear-gradient(to right, #2563eb, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 font-sans text-slate-900">
    
    <div class="main-card w-full max-w-5xl rounded-[2.5rem] p-10 md:p-14 text-center">
        
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-50 rounded-2xl mb-6">
            <i data-lucide="gamepad-2" class="w-8 h-8 text-blue-600"></i>
        </div>

        <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-4 leading-tight text-gradient">
            Django Multi-Game Arcade System
        </h1>
        
        <p class="text-slate-500 text-lg md:text-xl mb-8 font-medium max-w-xl mx-auto">
            Experience a variety of games in one place, built with Django and Tailwind CSS.
        </p>

        <div class="flex justify-center">
            <a href="/games" class="inline-flex items-center gap-3 px-12 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl rounded-xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl uppercase tracking-wider">
                Start Game
                <i data-lucide="play" class="w-5 h-5 fill-current"></i>
            </a>
        </div>

        <div class="mt-8 flex justify-center gap-8 text-slate-200">
            <i data-lucide="zap" class="w-5 h-5"></i>
            <i data-lucide="shield" class="w-5 h-5"></i>
            <i data-lucide="cpu" class="w-5 h-5"></i>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
