<html>
<head>
    <title>Arcade | {{ game.name }} Leaderboard</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0;
        }
        .leaderboard-card {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #f8fafc;
        }

        /* --- Scroll Logic Starts Here --- */
        .table-container {
            max-height: 500px; /* Search height customize garna saknu hunchha */
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f8fafc;
        }

        /* Webkit browsers (Chrome, Safari) ko lagi scrollbar appearance */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        table { border-collapse: separate; border-spacing: 0 10px; width: 100%; table-layout: fixed; }
        
        /* Sticky Header Logic */
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #ffffff; /* Header ko background solid hunuparchha scroll huda overlap huna nadina */
        }

        th { 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: #94a3b8; 
            padding: 1.5rem 1rem;
            letter-spacing: 0.15em;
            text-align: center;
        }
        
        td { 
            padding: 1.5rem 1rem; 
            background-color: #fcfcfc; 
            border-top: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            vertical-align: middle;
        }

        tr:hover td { background-color: #f1f5f9; border-color: #e2e8f0; }
        
        td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 1.5rem; border-bottom-left-radius: 1.5rem; }
        td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 1.5rem; border-bottom-right-radius: 1.5rem; }

        .rank-badge {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 900; margin: 0 auto;
        }
        
        .gold { background: linear-gradient(135deg, #fef08a, #eab308); color: #854d0e; }
        .silver { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #1e293b; }
        .bronze { background: linear-gradient(135deg, #ffedd5, #ea580c); color: #7c2d12; }
        .normal { background: #f1f5f9; color: #64748b; }
    </style>
</head>

<body class="min-h-screen p-4 md:p-12 flex items-center justify-center font-sans">

    <div class="leaderboard-card w-full max-w-5xl rounded-[3.5rem] p-8 md:p-16">
        
        <div class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter uppercase italic">
                {{ game.name }}
            </h1>
            <p class="text-blue-600 font-black tracking-[0.3em] uppercase mt-2">Rankings Table</p>
        </div>

        <div class="table-container">
            <table class="min-w-[700px]">
                <thead>
                    <tr>
                        <th width="10%">SN</th>
                        <th width="35%">Full Name</th>
                        <th width="30%">Username</th>
                        <th width="25%">Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in players %}
                    <tr>
                        <td>
                            <div class="rank-badge 
                                {% if forloop.counter == 1 %}gold
                                {% elif forloop.counter == 2 %}silver
                                {% elif forloop.counter == 3 %}bronze
                                {% else %}normal{% endif %}">
                                {{ forloop.counter }}
                            </div>
                        </td>
                        
                        <td class="font-black text-slate-800 text-xl">
                            {{ p.user.get_full_name|default:p.user.username }}
                        </td>

                        <td>
                            <span class="px-4 py-1.5 bg-slate-100 rounded-full text-slate-500 font-bold text-sm">
                                @{{ p.user.username }}
                            </span>
                        </td>

                        <td>
                            <span class="text-3xl font-black text-blue-600">
                                {{ p.formatted_score }}
                            </span>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center py-20">
                            <p class="text-slate-400 font-bold text-xl uppercase">No Records</p>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mt-12 text-center">
            <a href="javascript:history.back()" class="text-slate-400 hover:text-slate-900 font-black uppercase tracking-widest transition-all">
                Go Back
            </a>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
