<html>
<head>
    <title>Arcade System | Select Game</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('{% static "images/Games.avif" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            overflow: hidden; /* Body scroll banda gareko */
        }
        .main-container {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            max-height: 90vh; /* Screen bhanda thulo nahos */
        }

        /* --- Scroll Logic for Grid --- */
        .game-grid-container {
            overflow-y: auto;
            padding: 10px;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .game-grid-container::-webkit-scrollbar { width: 6px; }
        .game-grid-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .game-card {
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #2563eb;
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex items-center justify-center font-sans">

    <div class="main-container w-full max-w-6xl rounded-[2.5rem] p-6 md:p-12 border border-white/20">
        
        <div class="text-center mb-8 shrink-0">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-2 uppercase italic">Game Selection</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Choose your challenge</p>
            <div class="h-1.5 w-20 bg-blue-600 mx-auto rounded-full mt-4"></div>
        </div>

        <div class="game-grid-container">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div class="hidden bg-red-50 text-red-600 bg-green-50 text-green-600 bg-orange-50 text-orange-600 bg-purple-50 text-purple-600 border-orange-600 border-purple-500"></div>
               
                {% for game in games %}
                <a href="/games/{{ game.slug }}/" class="game-card p-6 rounded-[2rem] flex flex-col items-center text-center group">
                    <div class="w-16 h-16 bg-{{ game.color|default:'blue' }}-50 text-{{ game.color|default:'blue' }}-600 rounded-2xl flex items-center justify-center mb-4 transition-all group-hover:scale-110">
                        <i data-lucide="{{ game.icon|default:'gamepad-2' }}" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">{{ game.name }}</h3>
                    <p class="text-slate-500 mt-2 font-medium text-xs leading-relaxed line-clamp-2">
                        {{ game.description }}
                    </p>
                    
                    <div class="mt-4 flex items-center gap-2 text-blue-600 font-black text-[10px] uppercase">
                        Play Now <i data-lucide="play" class="w-3 h-3 fill-current"></i>
                    </div>
                </a>
                {% endfor %}

                <a href="/" class="game-card p-6 rounded-[2rem] flex flex-col items-center justify-center text-center border-dashed border-2 border-slate-200 bg-slate-50 opacity-80 hover:opacity-100">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center mb-3 shadow-sm">
                        <i data-lucide="arrow-left" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <span class="font-black text-slate-400 uppercase tracking-widest text-[10px]">Return Home</span>
                </a>

            </div>
        </div>
        
        <div class="h-4 shrink-0 bg-gradient-to-t from-white to-transparent -mt-4 z-10"></div>

    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
