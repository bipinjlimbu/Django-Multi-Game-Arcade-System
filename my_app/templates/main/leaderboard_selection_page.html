<html>
<head>
    <title>Arcade | Dynamic Leaderboards</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                              url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .main-container {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 40rem;
            border-radius: 2.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header-section {
            padding: 2.5rem 2.5rem 1.5rem 2.5rem;
            text-align: center;
            background: white;
            z-index: 10;
        }

        .scroll-area {
            max-height: 450px; /* Thulo card ko lagi height ali badhaidiye */
            overflow-y: auto;
            padding: 10px 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }

        .game-card {
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 1.5rem; 
            border-radius: 1.8rem;
            gap: 1.5rem;
            min-height: 110px; /* Card height fix yaha bata */
        }
        .game-card:hover {
            transform: translateX(10px);
            border-color: #2563eb;
            box-shadow: 0 15px 30px -10px rgba(37, 99, 235, 0.2);
        }

        .footer-section {
            padding: 1.5rem 2.5rem 2rem 2.5rem;
            background: white;
            border-top: 1px solid #f1f5f9;
        }
    </style>
</head>

<body class="font-sans text-slate-900">

    <div class="main-container">

        {% include "components/_messages.html" %}
        
        <div class="header-section">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2 uppercase italic">Leaderboards</h1>
            <p class="text-blue-600 font-bold text-xs uppercase tracking-[0.2em]">Select a game to view rankings</p>
            <div class="h-1.5 w-20 bg-blue-600 mx-auto rounded-full mt-3"></div>
        </div>

        <div class="scroll-area">
            {% for game in games %}
            <a href="/leaderboard/{{ game.slug }}/" class="game-card">
                <div class="w-16 h-16 bg-{{ game.color }}-50 text-{{ game.color }}-600 rounded-2xl flex items-center justify-center shrink-0">
                    <i data-lucide="{{ game.icon }}" class="w-9 h-9"></i>
                </div>
                <div class="flex-grow text-left">
                    <h3 class="text-2xl font-black text-slate-800">{{ game.name }}</h3>
                    <p class="text-slate-400 font-bold text-xs uppercase">{{ game.description }}</p>
                </div>
                <i data-lucide="trophy" class="w-7 h-7 text-yellow-500"></i>
            </a>
            {% empty %}
            <div class="text-center p-10 text-slate-400 font-bold">No games found.</div>
            {% endfor %}
        </div>

        <div class="footer-section">
            <a href="/" class="flex items-center justify-center gap-2 text-slate-400 hover:text-blue-600 transition-colors group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                <span class="font-bold uppercase tracking-[0.3em] text-[10px]">Return Home</span>
            </a>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script> lucide.createIcons(); </script>
</body>
</html>
