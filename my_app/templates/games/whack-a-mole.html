<html>
<head>
    <title>Arcade | Whack A Mole</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body { background-color: #0f172a; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; color: white; user-select: none; }
        .arena-top { 
            height: 25vh; width: 100%; position: relative; 
            background: linear-gradient(to bottom, #0f172a, #1e293b); 
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 4px solid rgba(255,255,255,0.1); z-index: 50;
        }
        .game-title { margin-top: 15px; font-size: 1.8rem; font-weight: 900; color: #fbbf24; letter-spacing: 3px; }
        .top-line { display: flex; gap: 40px; margin-top: 5px; font-weight: 800; font-size: 1.2rem; }
        #timer-text { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #ef4444; font-family: monospace; }

        .game-area { height: 75vh; display: flex; align-items: center; justify-content: center; background: #020617; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .hole { width: 130px; height: 130px; background: #1e293b; border: 4px solid #334155; border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); }

        .mole { width: 100%; height: 100%; position: absolute; top: 100%; display: flex; align-items: center; justify-content: center; transition: top 0.12s ease-out; cursor: pointer; border-radius: 50%; z-index: 10; }
        .mole.active { top: 10%; }
        .mole[data-type="mole"] { background: #d97706; border: 4px solid #a16207; }
        .mole[data-type="bomb"] { background: #ef4444; border: 4px solid #991b1b; }
        .mole[data-type="golden"] { background: #facc15; border: 4px solid #ca8a04; box-shadow: 0 0 20px #facc15; }
        .face { font-size: 2rem; font-weight: bold; pointer-events: none; color: rgba(0,0,0,0.7); }

        .floating-score { position: absolute; pointer-events: none; font-weight: 900; font-size: 2rem; animation: floatUp 0.6s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -80px); opacity: 0; } }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 220px; }
        .btn-end { padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1rem; text-align: center; text-decoration: none; display: block; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-outline { background: transparent; color: white; border: 2px solid #334155; }

        #level-overlay, #end-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
    </style>
</head>
<body>

    <div class="arena-top">
        <div class="game-title">WHACK A MOLE</div>
        <div class="top-line">
            <div>SCORE: <span id="score" style="color:#fbbf24">0</span></div>
            <div>LEVEL: <span id="lvl-display" style="color:#fbbf24">1</span></div>
        </div>
        <div id="timer-text">30.00s</div>
    </div>

    <div class="game-area">
        <div class="grid">
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
            <div class="hole"><div class="mole" onmousedown="whack(event)"></div></div>
        </div>
    </div>

    <div id="level-overlay"><h1 id="lvl-title" style="font-size: 5rem; font-style: italic; color:#fbbf24">LEVEL 1 BEGINS</h1></div>

    <div id="end-screen">
        <h2 style="font-size: 4rem; font-weight: 900;">GAME OVER</h2>
        <p style="font-size: 1.5rem; color:#94a3b8; margin-bottom: 25px;">Final Score: <span id="final-score-display" style="color:white">0</span></p>
        <div class="btn-group">
            <button onclick="location.reload()" class="btn-end btn-primary">Try Again</button>
            <a href="/leaderboard/whack-a-mole/" class="btn-end btn-outline">Leaderboard</a>
            <a href="/games/" class="btn-end btn-outline">Go Back</a>
        </div>
    </div>

    <script>
        let score = 0, level = 1, gameActive = false, timeLeft = 30.00;
        let gameTimer, moleTimer, lastHole;

        // Scoring based on level
        const scoreConfig = {
            1: { mole: 5, bomb: -10, golden: 20 },
            2: { mole: 10, bomb: -20, golden: 30 },
            3: { mole: 15, bomb: -30, golden: 50 }
        };

        function showLevelTransition(lvl) {
            gameActive = false;
            clearInterval(gameTimer);
            document.querySelectorAll('.mole').forEach(m => m.classList.remove('active'));
            document.getElementById('level-overlay').style.display = 'flex';
            document.getElementById('lvl-title').innerText = `LEVEL ${lvl} BEGINS`;
            setTimeout(() => {
                document.getElementById('level-overlay').style.display = 'none';
                gameActive = true;
                startTimer();
                spawn();
            }, 2000);
        }

        function spawn() {
            if (!gameActive) return;
            const moles = document.querySelectorAll('.mole');
            const idx = Math.floor(Math.random() * moles.length);
            if (idx === lastHole) return spawn();
            lastHole = idx;

            const mole = moles[idx];
            const rand = Math.random();
            if (rand < 0.2) { mole.dataset.type = 'bomb'; mole.innerHTML = '<span class="face">X_X</span>'; }
            else if (rand < 0.35) { mole.dataset.type = 'golden'; mole.innerHTML = '<span class="face">$_$</span>'; }
            else { mole.dataset.type = 'mole'; mole.innerHTML = '<span class="face">O_O</span>'; }

            mole.classList.add('active');
            let showDuration = Math.max(500, 1000 - (level * 100));
            moleTimer = setTimeout(() => {
                mole.classList.remove('active');
                if (gameActive) setTimeout(spawn, 400);
            }, showDuration);
        }

        function whack(e) {
            const mole = e.currentTarget;
            if (!gameActive || !mole.classList.contains('active')) return;
            clearTimeout(moleTimer);
            mole.classList.remove('active');

            const type = mole.dataset.type;
            const config = scoreConfig[level];
            let p = type === 'bomb' ? config.bomb : (type === 'golden' ? config.golden : config.mole);
            let color = type === 'bomb' ? "#ef4444" : (type === 'golden' ? "#facc15" : "#fbbf24");

            score = Math.max(0, score + p);
            document.getElementById('score').innerText = score;

            const float = document.createElement('div');
            float.className = 'floating-score';
            float.innerText = (p > 0 ? '+' : '') + p;
            float.style.color = color;
            float.style.left = e.clientX + 'px';
            float.style.top = e.clientY + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 600);

            if (gameActive) setTimeout(spawn, 250);
        }

        function startTimer() {
            gameTimer = setInterval(() => {
                if (!gameActive) return;
                timeLeft -= 0.01;
                document.getElementById('timer-text').innerText = Math.max(0, timeLeft).toFixed(2) + 's';
                if (timeLeft <= 0) {
                    gameActive = false;
                    if (level < 3) {
                        level++; timeLeft = 30.00;
                        document.getElementById('lvl-display').innerText = level;
                        showLevelTransition(level);
                    } else { endGame(); }
                }
            }, 10);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('final-score-display').innerText = score;
            document.getElementById('end-screen').style.display = 'flex';
            
            // Arrow Defense wala Save-Score Logic
            fetch('/save-score/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': '{{ csrf_token }}' 
                },
                body: JSON.stringify({ score: score, slug: 'whack-a-mole' })
            });
        }

        window.onload = () => showLevelTransition(1);
    </script>
</body>
</html>
