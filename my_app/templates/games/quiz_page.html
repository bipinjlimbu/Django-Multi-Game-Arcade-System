<html>
<head>
    <title>Quiz Challenge | {{ category.name }}</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('{% static "images/Games.avif" %}');
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0;
        }
        .main-container { background-color: #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); position: relative; min-height: 500px; }
        
        .option-card { border: 2px solid #f1f5f9; transition: all 0.2s ease; cursor: pointer; min-height: 75px; }
        .option-card:hover:not(.disabled) { border-color: #2563eb; background-color: #f8fafc; transform: translateY(-2px); }
        
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .missed { border: 2px solid #22c55e !important; background-color: #f0fdf4; }

        .timer-bar { transition: width 0.2s linear; }
        .disabled { pointer-events: none; }

        /* Level Overlay logic - Countdown numbers removed as requested */
        #level-overlay, #end-screen {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 2.5rem; text-align: center;
        }

        .btn-action {
            width: 240px; padding: 1.2rem; border-radius: 1.2rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-12 flex items-center justify-center font-sans">

    <div class="main-container w-full max-w-4xl rounded-[2.5rem] p-10 md:p-14 overflow-hidden">
        
        <div id="level-overlay">
            <p class="text-slate-400 font-black uppercase tracking-[0.3em] text-xs mb-2">Challenge Upgraded</p>
            <h1 id="next-level-title" class="text-5xl font-black text-slate-900 uppercase italic mb-8">Level 1 Begins</h1>
            <div class="w-20 h-20 rounded-full border-8 border-blue-600 flex items-center justify-center">
                <span class="text-2xl font-black text-blue-600">GO!</span>
            </div>
        </div>

        <div id="end-screen">
            <div class="mb-10">
                <p class="text-slate-400 font-black uppercase tracking-widest text-xs mb-2">Quiz Completed</p>
                <h1 class="text-6xl font-black text-slate-900 italic mb-4">FINISH!</h1>
                <p class="text-slate-500 font-bold text-lg">Final Score: <span id="final-score-display" class="text-blue-600 text-3xl ml-1">0</span></p>
            </div>
            <div class="flex flex-col gap-5">
                <a href="/leaderboard/quiz/?category={{ category.slug }}" class="btn-action bg-blue-600 text-white hover:bg-blue-700 shadow-xl shadow-blue-100">
                    <i data-lucide="trophy" class="w-6 h-6"></i> View Leaderboard
                </a>
                <a href="/games/" class="btn-action bg-slate-900 text-white hover:bg-black">
                    <i data-lucide="home" class="w-6 h-6"></i> Quit
                </a>
            </div>
        </div>

        <div class="flex justify-between items-end mb-4">
            <div>
                <span id="level-badge" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">
                    Level 1: Easy
                </span>
                <h2 class="text-3xl font-black text-slate-900 mt-3 uppercase italic leading-none">{{ category.name }}</h2>
            </div>
            <div class="text-right">
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-tighter">Total Score</p>
                <p id="total-score" class="text-4xl font-black text-blue-600 leading-none">0</p>
            </div>
        </div>

        <div id="feedback-text" class="text-center font-black uppercase tracking-[0.2em] text-xs py-3 mb-4 rounded-xl invisible">
            Status Message
        </div>

        <div class="space-y-3 mb-10">
            <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 tracking-widest">
                <span id="question-number">Question 1/10</span>
                <span id="timer-text">Time Left: 15s</span>
            </div>
            <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="timer-bar" class="timer-bar h-full bg-blue-600 w-full"></div>
            </div>
        </div>

        <div id="quiz-area">
            <h1 id="question-text" class="text-2xl md:text-3xl font-black text-slate-800 mb-10 leading-tight min-h-[100px]">
                Loading...
            </h1>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();

        let currentLevel = 1, questions = [], currentIndex = 0, totalScore = 0, timerInterval = null, timeLeft = 15, gameActive = false;
        const pointsConfig = { 1: 5, 2: 10, 3: 15 };

        async function fetchQuestions() {
            try {
                const response = await fetch(`/api/questions/{{ category.slug }}/${currentLevel}/`);
                const data = await response.json();
                questions = data.questions;
                currentIndex = 0;
                loadQuestion();
            } catch (err) { console.error("Error fetching data."); }
        }

        function loadQuestion() {
            stopTimer();
            if (currentIndex >= questions.length) { handleLevelProgression(); return; }

            const fb = document.getElementById('feedback-text');
            fb.classList.add('invisible');
            fb.style.backgroundColor = 'transparent';

            const q = questions[currentIndex];
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('question-number').innerText = `Question ${currentIndex + 1}/10`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            q.options.forEach((opt, index) => {
                const label = String.fromCharCode(65 + index); // A, B, C, D firta aayo
                const card = document.createElement('div');
                card.className = 'option-card p-6 rounded-2xl font-bold text-slate-700 flex items-center justify-between group';
                card.dataset.correct = opt.is_correct;
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-lg text-xs font-black group-hover:bg-blue-600 group-hover:text-white transition-colors">${label}</span>
                        <span>${opt.text}</span>
                    </div>
                `;
                card.onclick = () => { if(gameActive) checkAnswer(card, opt.is_correct); };
                grid.appendChild(card);
            });
            startTimer();
        }

        function checkAnswer(selectedCard, isCorrect) {
            stopTimer();
            const cards = document.querySelectorAll('.option-card');
            const fb = document.getElementById('feedback-text');
            cards.forEach(c => c.classList.add('disabled'));
            fb.classList.remove('invisible');

            if (isCorrect) {
                selectedCard.classList.add('correct');
                totalScore += pointsConfig[currentLevel];
                document.getElementById('total-score').innerText = totalScore;
                fb.innerText = "✓ Correct! Well done Sir";
                fb.style.color = "#15803d";
                fb.style.backgroundColor = "#f0fdf4";
            } else {
                selectedCard.classList.add('wrong');
                fb.innerText = "✗ Incorrect Answer";
                fb.style.color = "#b91c1c";
                fb.style.backgroundColor = "#fef2f2";
                cards.forEach(c => { if (c.dataset.correct === "true") c.classList.add('missed'); });
            }
            setTimeout(() => { currentIndex++; loadQuestion(); }, 2000);
        }

        function startTimer() {
            timeLeft = 15;
            updateTimerUI();
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerUI();
                if (timeLeft <= 0) { 
                    stopTimer(); 
                    document.getElementById('feedback-text').innerText = "⌛ Time Up!";
                    document.getElementById('feedback-text').classList.remove('invisible');
                    document.querySelectorAll('.option-card').forEach(c => {
                        if (c.dataset.correct === "true") c.classList.add('missed');
                        c.classList.add('disabled');
                    });
                    setTimeout(() => { currentIndex++; loadQuestion(); }, 2000);
                }
            }, 1000);
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            const text = document.getElementById('timer-text');
            text.innerText = `Time Left: ${timeLeft}s`;
            bar.style.width = `${(timeLeft / 15) * 100}%`;
            if (timeLeft <= 5) { bar.style.backgroundColor = "#ef4444"; text.style.color = "#ef4444"; }
            else { bar.style.backgroundColor = "#2563eb"; text.style.color = "#94a3b8"; }
        }

        function handleLevelProgression() {
            if (currentLevel < 3) { currentLevel++; startLevelTransition(); }
            else { saveFinalScoreAndEnd(); }
        }

        function startLevelTransition() {
            gameActive = false;
            const overlay = document.getElementById('level-overlay');
            const title = document.getElementById('next-level-title');
            const badge = document.getElementById('level-badge');
            
            title.innerText = `Level ${currentLevel} Begins`;
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                badge.innerText = `Level ${currentLevel}: ${currentLevel == 2 ? 'Medium' : 'Hard'}`;
                gameActive = true;
                fetchQuestions();
            }, 2000);
        }

        function saveFinalScoreAndEnd() {
            stopTimer();
            document.getElementById('final-score-display').innerText = totalScore;
            fetch('/save-score/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ slug: 'quiz', category: '{{ category.slug }}', score: totalScore })
            }).then(() => { 
                document.getElementById('end-screen').style.display = 'flex'; 
                lucide.createIcons(); 
            });
        }

        startLevelTransition();
    </script>
</body>
</html>
