<html>
<head>
    <title>Arcade | Arrow Defense</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body { background-color: #0f172a; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        .arena { height: 65vh; width: 100%; position: relative; background: linear-gradient(to bottom, #0f172a, #1e293b); border-bottom: 8px solid #000; display: flex; flex-direction: column; align-items: center; }
        .game-title { margin-top: 15px; font-size: 2.2rem; font-weight: 900; color: #fbbf24; letter-spacing: 4px; }
        .top-stats { display: flex; gap: 40px; margin-top: 5px; font-weight: 800; font-size: 1.2rem; }
        #word-box { position: absolute; top: 400px; font-size: 4.5rem; font-weight: 900; color: rgba(255,255,255,0.12); text-transform: uppercase; letter-spacing: 12px; pointer-events: none; }
        
        /* HP System */
        .hp-bar-container { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 60px; height: 8px; background: #475569; border-radius: 4px; border: 1px solid white; }
        .hp-fill { height: 100%; width: 100%; transition: 0.3s; }
        
        /* Stickman Styles */
        .stickman { position: absolute; bottom: 0px; width: 80px; height: 120px; z-index: 5; }
        #player { left: 10%; } #enemy { right: 10%; transform: scaleX(-1); }
        .head { width: 24px; height: 24px; border: 3px solid white; border-radius: 50%; position: absolute; top: 0; left: 28px; }
        .torso { width: 3px; height: 45px; background: white; position: absolute; top: 24px; left: 38.5px; }
        .arm { width: 35px; height: 3px; background: white; position: absolute; top: 35px; transform-origin: left; }
        .arm-top { left: 38.5px; transform: rotate(-20deg); } .arm-bottom { left: 38.5px; transform: rotate(20deg); }
        .leg { width: 3px; height: 42px; background: white; position: absolute; top: 68px; transform-origin: top; }
        .leg-left { left: 38.5px; transform: rotate(18deg); } .leg-right { left: 38.5px; transform: rotate(-18deg); }
        .bow-curve { position: absolute; width: 15px; height: 60px; border-left: 3px solid #fbbf24; border-radius: 40%; left: 65px; top: 8px; }
        
        .arrow { position: absolute; width: 45px; height: 4px; border-radius: 2px; z-index: 50; bottom: 85px; }
        .e-arrow { background: #ef4444; } .p-arrow { background: #22c55e; }
        
        .ui-panel { height: 35vh; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #input-field { width: 85%; max-width: 500px; padding: 22px; border: 6px solid #f1f5f9; border-radius: 25px; font-size: 2.5rem; font-weight: 900; text-align: center; outline: none; color: #1e293b; }

        /* UPGRADED END SCREEN (BSDK style) */
        #end-screen {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #end-screen.active { display: flex; opacity: 1; }
        
        .btn-game { width: 220px; padding: 12px; margin: 8px; border-radius: 8px; font-weight: 800; text-transform: uppercase; transition: 0.2s; text-align: center; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { transform: translateY(-2px); background: #1d4ed8; }
        .btn-outline { background: transparent; color: white; border: 2px solid #334155; }
        .btn-outline:hover { background: #334155; transform: translateY(-2px); }

        /* Particle Explosion */
        .particle { position: fixed; width: 8px; height: 8px; pointer-events: none; z-index: 110; border-radius: 50%; }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="arena">
        <div class="game-title">ARROW DEFENSE</div>
        <div class="top-stats">
            <div>SCORE: <span id="score" style="color:#fbbf24">0</span></div>
            <div>LEVEL: <span id="lvl-display" style="color:#fbbf24">1</span></div>
        </div>
        <div id="word-box">---</div>
        
        <div id="player" class="stickman">
            <div class="hp-bar-container"><div id="p-hp-fill" class="hp-fill" style="background:#22c55e"></div></div>
            <div class="bow-curve"></div><div class="head"></div><div class="torso"></div>
            <div class="arm arm-top"></div><div class="arm arm-bottom"></div>
            <div class="leg leg-left"></div><div class="leg leg-right"></div>
        </div>

        <div id="enemy" class="stickman">
            <div class="hp-bar-container"><div id="e-hp-fill" class="hp-fill" style="background:#ef4444"></div></div>
            <div class="bow-curve" style="border-color:#ef4444"></div><div class="head" style="border-color:#ef4444"></div><div class="torso" style="background:#ef4444"></div>
            <div class="arm arm-top" style="background:#ef4444"></div><div class="arm arm-bottom" style="background:#ef4444"></div>
            <div class="leg leg-left" style="background:#ef4444"></div><div class="leg leg-right" style="background:#ef4444"></div>
        </div>
    </div>

    <div class="ui-panel">
        <input type="text" id="input-field" placeholder="TYPE TO SHOOT..." autocomplete="off">
    </div>

    <div id="end-screen">
        <h2 id="status-display" class="text-6xl font-black italic mb-2">COMPLETE!</h2>
        <p class="text-slate-400 mb-8 font-mono text-xl">Final Score: <span id="final-score-display" class="text-white">0</span></p>
        
        <button onclick="location.reload()" class="btn-game btn-primary">Try Again</button>
        <a href="/leaderboard/arrow-defense/" class="btn-game btn-outline">Leaderboard</a>
        <a href="/games/" class="btn-game btn-outline">Go Back</a>
    </div>

    <script>
        const wordBank = {
            1: ['CAT', 'DOG', 'SQL', 'WEB', 'API'],
            2: ['DJANGO', 'PYTHON', 'SELECT', 'SERVER'],
            3: ['DATABASE', 'FRAMEWORK', 'FRONTEND', 'BACKEND']
        };

        let score = 0, hp = 100, level = 1, gameActive = true, currentWord = '', currentEnemyArrow = null;
        const input = document.getElementById('input-field');
        const wordBox = document.getElementById('word-box');
        const endScreen = document.getElementById('end-screen');

        function nextTurn() {
            if (!gameActive) return;
            const list = wordBank[level];
            currentWord = list[Math.floor(Math.random() * list.length)];
            wordBox.innerText = currentWord;
            input.value = '';
            document.getElementById('enemy').classList.add('draw-bow');
            setTimeout(() => { if(gameActive) spawnEnemyArrow(); }, 400);
        }

        function spawnEnemyArrow() {
            const el = document.createElement('div');
            el.className = 'arrow e-arrow'; el.style.right = '15%';
            document.querySelector('.arena').appendChild(el);
            let pos = 15;
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); el.remove(); return; }
                pos += 0.6; el.style.right = pos + '%';
                if (pos >= 85) { clearInterval(move); el.remove(); takeDamage(); nextTurn(); }
            }, 20);
            currentEnemyArrow = { el, move };
        }

        function playerShoot() {
            const el = document.createElement('div');
            el.className = 'arrow p-arrow'; el.style.left = '15%';
            document.querySelector('.arena').appendChild(el);
            let pPos = 15;
            const pMove = setInterval(() => {
                pPos += 4; el.style.left = pPos + '%';
                if (currentEnemyArrow && pPos >= (100 - parseFloat(currentEnemyArrow.el.style.right)) - 3) {
                    clearInterval(pMove); clearInterval(currentEnemyArrow.move);
                    el.remove(); currentEnemyArrow.el.remove(); currentEnemyArrow = null;
                    score += (level === 1 ? 5 : level === 2 ? 10 : 15);
                    document.getElementById('score').innerText = score;
                    if(score % 50 === 0 && level < 3) { level++; document.getElementById('lvl-display').innerText = level; }
                    setTimeout(nextTurn, 400);
                }
                if (pPos >= 100) { clearInterval(pMove); el.remove(); }
            }, 10);
        }

        input.addEventListener('input', () => {
            if (input.value.trim().toUpperCase() === currentWord) playerShoot();
        });

        function takeDamage() {
            hp -= 20; document.getElementById('p-hp-fill').style.width = hp + '%';
            if (hp <= 0) endGame("DEFEATED");
        }

        function createParticles() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%'; p.style.top = '50%';
                p.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                p.style.setProperty('--tx', (Math.random() - 0.5) * 600 + 'px');
                p.style.setProperty('--ty', (Math.random() - 0.5) * 600 + 'px');
                p.style.animation = `explode ${0.5 + Math.random()}s forwards ease-out`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function endGame(msg) {
            gameActive = false;
            createParticles();
            
            // Backend ma score save garne
            fetch('/save-score/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ score: score, slug: 'arrow-defense' })
            })
            .then(res => {
                setTimeout(() => {
                    document.getElementById('status-display').innerText = msg;
                    document.getElementById('status-display').style.color = msg === "DEFEATED" ? "#ef4444" : "#10b981";
                    document.getElementById('final-score-display').innerText = score;
                    endScreen.classList.add('active');
                }, 800);
            });
        }

        nextTurn();
        input.focus();
    </script>
</body>
</html>
