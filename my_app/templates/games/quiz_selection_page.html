<html>
<head>
    <title>Quiz | Select Category</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        body {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('{% static "images/Games.avif" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
        }
        .main-container {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        .category-card {
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        /* Dynamic Hover Effects based on Category Color */
        .hover-blue:hover { border-color: #2563eb; box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.2); }
        .hover-green:hover { border-color: #10b981; box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.2); }
        .hover-orange:hover { border-color: #f97316; box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.2); }
        
        .category-card:hover { transform: translateY(-8px); }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12 flex items-center justify-center font-sans">

    <div class="main-container w-full max-w-6xl rounded-[2.5rem] p-10 md:p-16">
        
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-slate-900 tracking-tight mb-2 uppercase italic">Select Category</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Choose your field of expertise</p>
            <div class="h-1.5 w-24 bg-blue-600 mx-auto rounded-full mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            {% for category in categories %}
            <a href="/games/quiz/{{ category.slug }}/" 
               class="category-card p-10 rounded-[2rem] flex flex-col items-center text-center hover-{{ category.color|default:'blue' }}">

                <div class="w-24 h-24 bg-{{ category.color|default:'blue' }}-50 text-{{ category.color|default:'blue' }}-600 rounded-[1.5rem] flex items-center justify-center mb-6">
                    <i data-lucide="{{ category.icon|default:'cpu' }}" class="w-12 h-12"></i>
                </div>

                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">{{ category.name }}</h3>
                <p class="text-slate-500 mt-2 font-medium text-sm leading-relaxed">
                    Complete all 3 levels to master this topic.
                </p>
                
                <div class="mt-8 flex items-center gap-2 text-{{ category.color|default:'blue' }}-600 font-black text-xs uppercase tracking-tighter">
                    Start Challenge <i data-lucide="play" class="w-3 h-3 fill-current"></i>
                </div>
            </a>
            {% empty %}
            <div class="col-span-full text-center py-10">
                <p class="text-slate-400 font-bold uppercase tracking-widest">No categories available at the moment.</p>
            </div>
            {% endfor %}

            <a href="/games/" class="category-card p-8 rounded-[2rem] flex flex-col items-center justify-center text-center border-dashed border-2 border-slate-200 bg-slate-50 opacity-80 hover:opacity-100">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-4 shadow-sm">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-slate-400"></i>
                </div>
                <span class="font-black text-slate-400 uppercase tracking-[0.2em] text-xs">Exit to Arcade</span>
            </a>

        </div>
    </div>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
