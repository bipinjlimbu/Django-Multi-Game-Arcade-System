<html>
<head>
    <title>Arcade | Reaction Game</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .target-pop { animation: pop 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            from { transform: scale(0.4); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body class="bg-[#020617] h-screen flex flex-col items-center justify-center m-0 overflow-hidden text-white">

    <div id="game-ui" class="flex flex-col items-center">
        <div class="text-center mb-4">
            <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter">REACTION GAME</h1>
            <p class="mt-2 inline-block bg-white/10 px-4 py-1 rounded-full text-slate-400 text-[10px] font-black uppercase tracking-widest">
                Green +10 | Red -5 | Time 60s
            </p>
        </div>

        <div class="flex gap-12 md:gap-24 mb-8 text-center bg-white/5 p-4 rounded-3xl border border-white/10">
            <div class="flex flex-col">
                <span class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Time</span>
                <span id="timer-val" class="text-5xl font-black leading-none">60</span>
            </div>
            <div class="flex flex-col">
                <span class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Score</span>
                <span id="score-val" class="text-5xl font-black leading-none">0</span>
            </div>
        </div>

        <div class="bg-white p-5 md:p-8 rounded-[2.5rem] shadow-2xl shadow-blue-900/20">
            <div class="grid grid-cols-4 grid-rows-2 gap-3 md:gap-5">
                {% for i in "12345678" %}
                <div class="square w-20 h-20 md:w-32 md:h-32 bg-slate-200 rounded-xl relative cursor-pointer active:scale-90 transition-transform overflow-hidden shadow-inner">
                    <div class="target hidden w-full h-full rounded-xl target-pop"></div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div id="game-over" class="fixed inset-0 bg-slate-950 flex hidden flex-col items-center justify-center z-[9999] p-4 text-center">
        <div class="animate-bounce mb-4">
            <span class="bg-red-600 text-white px-6 py-2 rounded-full font-black text-sm uppercase tracking-widest">Finished!</span>
        </div>
        <h1 class="text-7xl md:text-9xl font-black italic text-white mb-2 tracking-tighter">TIME'S UP!</h1>
        <p class="text-2xl md:text-3xl font-bold text-slate-400 mb-12 uppercase tracking-widest">
            Final Score: <span id="final-score" class="text-green-500 text-5xl md:text-6xl block mt-2">0</span>
        </p>
        
        <div class="flex flex-col gap-4 w-full max-w-sm">
            <button onclick="location.reload()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xl hover:bg-blue-500 hover:text-white transition-all transform hover:-translate-y-1 active:scale-95 shadow-xl">
                Try Again
            </button>
            <a href="/leaderboard/reaction-game" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xl hover:bg-blue-700 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center shadow-xl">
                Leaderboard
            </a>
            <a href="/games" class="w-full bg-slate-800 text-slate-400 py-4 rounded-2xl font-black uppercase text-sm hover:text-white transition-all flex items-center justify-center tracking-widest">
                Go Back
            </a>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let gameActive = true;
        let currentSpawnRate = 1000;

        const scoreEl = document.getElementById('score-val');
        const timerEl = document.getElementById('timer-val');
        const squares = document.querySelectorAll('.square');
        const targets = document.querySelectorAll('.target');

        squares.forEach(sq => {
            sq.addEventListener('mousedown', function() {
                if (!gameActive) return;
                const target = this.querySelector('.target');
                if (!target.classList.contains('hidden')) {
                    const isRed = target.classList.contains('bg-red-500');
                    score += isRed ? -5 : 10;
                    scoreEl.innerText = score;
                    target.classList.add('hidden');
                }
            });
        });

        const timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            timerEl.innerText = timeLeft;
            currentSpawnRate = 250 + (timeLeft * 12.5); 
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000);

        function spawn() {
            if (!gameActive) return;
            targets.forEach(t => {
                t.classList.add('hidden');
                t.classList.remove('bg-red-500', 'bg-green-500', 'border-8', 'border-red-700', 'border-green-700');
            });
            const idx = Math.floor(Math.random() * squares.length);
            const activeTarget = targets[idx];
            const isRed = Math.random() < 0.33; 
            if (isRed) {
                activeTarget.classList.add('bg-red-500', 'border-8', 'border-red-700');
            } else {
                activeTarget.classList.add('bg-green-500', 'border-8', 'border-green-700');
            }
            activeTarget.classList.remove('hidden');
            setTimeout(spawn, currentSpawnRate);
        }

        function endGame() {
            gameActive = false;
            // Hide main UI and show Game Over UI
            document.getElementById('game-ui').classList.add('opacity-10');
            const gameOverScreen = document.getElementById('game-over');
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
            document.getElementById('final-score').innerText = score;

            fetch('/reaction/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ slug: 'reaction-game', score: score })
            });
        }
        spawn();
    </script>
</body>
</html>
